<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="tables">
<table>
 
  <tr>
    <th colspan="4" class="title">Bill</th>
  </tr>
  <tr>
    <th colspan="2" class="subtitle">Adidas</th>
    <th colspan="2" class="subtitle">Nike</th>
  </tr>

  <tr>
    <td>Shorts</td>
    <td>440</td>
    <td>Bat</td>
    <td>1200</td>
  </tr>
  <tr>
    <td>Shoes</td>
    <td>1500</td>
    <td>Sliders</td>
    <td>900</td>
  </tr>
  <tr>
    <td>KIT</td>
    <td>2000</td>
    <td>Jacket</td>
    <td>1500</td>
  </tr>
  <tr>
    <td colspan="2" class="footer">total:9999</td>
    <td colspan="2" class="footer">total:9999</td>
  </tr>
</table>



<br><br>



<table>
  
  <tr>
    <th colspan="2">Grades</th>
    <th>Ram</th>
    <th>Kishan</th>
  </tr>

  <tr>
    <td rowspan="2">English</td>
    <td>Labaratory</td>
    <td>A+</td>
    <td>A</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A+</td>
    <td>A</td>
  </tr>

  <tr>
    <td rowspan="2">Chemistry</td>
    <td>Practical</td>
    <td>B</td>
    <td>B</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A</td>
    <td>C</td>
  </tr>

  <tr>
    <td rowspan="2">Literature</td>
    <td>Labaratory</td>
    <td>A</td>
    <td>A</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>D</td>
    <td>B</td>
  </tr>
</table>
</div>

</body>
</html>
